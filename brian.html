    <style>
        :root {
            --bg-color: #050505;
            --accent-color: #ffffff;
            --card-bg: #111111;

        body {
            background-color: var(--bg-color);
            color: var(--accent-color);
            font-family: 'Inter', sans-serif;
            overflow-x: hidden;
        }

        .noise::before {
            content: "";
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: url('https://grainy-gradients.vercel.app/noise.svg');
            opacity: 0.05;
            pointer-events: none;
            z-index: 9999;
        }

        .bento-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            grid-auto-rows: minmax(180px, auto);
            gap: 1.5rem;
        }

        .bento-item {
            background: var(--card-bg);
            border-radius: 24px;
            padding: 2rem;
            display: flex;
            flex-direction: column;
            position: relative;
            overflow: hidden;
            border: 1px solid rgba(255,255,255,0.05);
            text-decoration: none;
            color: inherit;
        }

        .col-span-4 { grid-column: span 4; }

        @media (max-width: 768px) {
            .bento-grid {
                grid-template-columns: 1fr;
                gap: 1rem;
            }
            .col-span-4 { grid-column: span 1; }
        }

        /* Общие контролы */
        .lab-controls select, .lab-controls button {
            background: #1a1a1a;
            border: 1px solid rgba(255,255,255,0.1);
            color: white;
            padding: 0.5rem 1rem;
            border-radius: 8px;
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            cursor: pointer;
            transition: all 0.3s;
            outline: none;
        }
        .lab-controls button:hover, .lab-controls select:hover {
            background: white;
            color: black;
        }

        /* Анимация карты */
        .card-reveal {
            /* Заменил forwards на both, чтобы элемент был невидим во время animation-delay */
            animation: cardFade 0.6s cubic-bezier(0.16, 1, 0.3, 1) both;
        }

        @keyframes cardFade {
            0% {
                opacity: 0;
                transform: translateY(20px) scale(0.98);
                filter: blur(4px);
            }
            100% {
                opacity: 1;
                transform: translateY(0) scale(1);
                filter: blur(0);
            }
        }

        /* Большая кнопка */
        .btn-draw {
            background: transparent !important;
            border: 1px solid rgba(255,255,255,0.3) !important;
            font-size: 14px !important;
            padding: 1rem 2.5rem !important;
            border-radius: 100px !important;
            font-weight: 900 !important;
            letter-spacing: 0.15em !important;
        }
        .btn-draw:hover {
            background: white !important;
            color: black !important;
            transform: scale(1.05);
        }

                    "Читай карты с конца к началу.", "Представь, что персонаж карты пытается тебя обмануть.", "Выбери карту-сигнификатор закрытыми глазами.", "Какая погода сейчас на этой карте?", 
                    "Сложи номера всех карт в раскладе и найди Аркан с таким номером.", "Прочитай расклад шепотом.", "Задай вопрос о прошлом, а не о будущем.", "Обрати внимание на направление взглядов персонажей. Куда они смотрят?", 
                    "Сделай расклад в полной тишине, не произнося вопрос вслух.", "Представь, что этот Аркан — место. Опиши, как там пахнет.", "Используй только Пажей и Рыцарей.", "Какая карта является тенью той, что ты только что вытянул?", 
                    "Перерисуй выпавшую карту по памяти.", "Сделай расклад, используя только карты с четными номерами.", "Найди на карте деталь, которую ты раньше никогда не замечал.", 
                    "Что бы сказала эта карта, если бы могла говорить только одно слово?", "Соедини линии на картах в раскладе в единый маршрут.", "Представь, что колода пуста, и нарисуй ответ в своем воображении.", 
                    "Убери колоду в шкаф. Начни читать знаки вокруг себя в реальном мире."
                ]
            };

            const DOM = {
                btn1: document.getElementById('os-draw-1-btn'),
                btn2: document.getElementById('os-draw-2-btn'),
                deckSelect: document.getElementById('os-deck'),
                cardContainer: document.getElementById('os-card-container')
            };

            let lastIndex = -1;
            let lastDrawCount = 1; // Запоминаем, сколько карт тянули последним (для пробела)

            function drawCards(count) {
                lastDrawCount = count;
                const currentDeck = DOM.deckSelect.value;
                const cards = DECKS[currentDeck];
                
                let selectedIndices = [];
                let selectedTexts = [];

                for (let i = 0; i < count; i++) {
                    let randomIndex;
                    let attempts = 0;
                    // Ищем уникальный индекс
                    do {
                        randomIndex = Math.floor(Math.random() * cards.length);
                        attempts++;
                    } while (
                        (selectedIndices.includes(randomIndex) || 
                        (count === 1 && randomIndex === lastIndex)) && 
                        attempts < 50
                    );
                    
                    selectedIndices.push(randomIndex);
                    selectedTexts.push(cards[randomIndex]);
                }

                if (count === 1) {
                    lastIndex = selectedIndices[0];
                }

                // Сбрасываем контейнер (хак с offsetWidth для перезапуска CSS-анимаций)
                DOM.cardContainer.innerHTML = '';
                void DOM.cardContainer.offsetWidth; 
                
                if (count === 1) {
                    DOM.cardContainer.innerHTML = `
                        <p class="text-2xl md:text-4xl lg:text-5xl font-black text-center leading-tight tracking-tighter uppercase card-reveal">
                            ${selectedTexts[0]}
                        </p>
                    `;
                } else {
                    // Верстка для двух карт: текст чуть меньше, разделены тонкой полоской
                    DOM.cardContainer.innerHTML = `
                        <p class="text-xl md:text-3xl lg:text-4xl font-black text-center leading-tight tracking-tighter uppercase text-gray-300 card-reveal">
                            ${selectedTexts[0]}
                        </p>
                        <div class="w-16 h-px bg-white/20 my-6 card-reveal" style="animation-delay: 0.1s;"></div>
                        <p class="text-xl md:text-3xl lg:text-4xl font-black text-center leading-tight tracking-tighter uppercase card-reveal" style="animation-delay: 0.2s;">
                            ${selectedTexts[1]}
                        </p>
                    `;
                }
            }

            // Слушатели кнопок
            DOM.btn1.addEventListener('click', () => drawCards(1));
            DOM.btn2.addEventListener('click', () => drawCards(2));
            
            // При смене колоды сразу вытягиваем карты (в том же количестве, что и до этого)
            DOM.deckSelect.addEventListener('change', () => drawCards(lastDrawCount));

            // Обработка нажатия пробела
            document.addEventListener('keydown', (e) => {
                if (e.code === 'Space') {
                    if (['INPUT', 'SELECT', 'BUTTON'].includes(e.target.tagName)) return;
                    e.preventDefault();
                    
                    // Визуальный отклик активной кнопки
                    const activeBtn = lastDrawCount === 1 ? DOM.btn1 : DOM.btn2;
                    activeBtn.style.transform = 'scale(0.95)';
                    setTimeout(() => activeBtn.style.transform = '', 100);
                    
                    drawCards(lastDrawCount);
                }
            });

        })();
    </script>

<!-- Всплывашка-нож (Cookie) - Финальная версия -->
    <div id="cookie-knife" class="fixed bottom-6 left-1/2 z-[9999] flex items-center transition-all duration-1000 transform -translate-x-1/2 translate-y-40 opacity-0 drop-shadow-2xl">
        
        <!-- Острие и лезвие -->
        <div class="relative h-12 md:h-14 bg-[#111111] border border-white/10 border-r-0 flex items-center justify-end pr-4 md:pr-6 pl-14 md:pl-16 w-[220px] sm:w-[260px] md:w-[320px]" 
             style="border-bottom-left-radius: 120px 100%; border-top-left-radius: 0;">
            
            <div class="relative z-10 flex items-center justify-end w-full">
                <!-- Убрана точка после Cookie -->
                <p class="text-[8px] md:text-[10px] text-gray-400 uppercase tracking-widest leading-tight text-right">
                    Мы собираем <span class="text-white font-bold">Cookie</span><br>
                    <a href="/privacy.html" class="underline hover:text-white transition">Политика</a>
                </p>
            </div>
        </div>

        <!-- "Палочка" (Гарда) -->
        <!-- Заменили прозрачный белый (bg-white/20) на плотный серый (bg-neutral-600) -->
        <div class="h-14 w-1.5 md:h-16 md:w-1.5 bg-neutral-600 rounded-sm relative z-10 pointer-events-none shadow-sm"></div>

        <!-- Рукоять, которая и является кнопкой "Принять" -->
        <button id="accept-cookie-btn" class="h-12 w-auto md:h-14 bg-[#1a1a1a] rounded-r-md border border-white/10 border-l-0 flex items-center justify-center relative px-4 md:px-6 hover:bg-white hover:text-black hover:border-white transition-colors cursor-pointer group">
            
            <!-- Текст ПРИНЯТЬ на самой рукояти (без лишних элементов) -->
            <span class="text-[8px] md:text-[10px] font-bold uppercase text-white group-hover:text-black transition-colors whitespace-nowrap z-20 relative">
                Принять
            </span>
            
        </button>

    </div>

    <!-- Скрипт логики всплывашки -->
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const cookieKnife = document.getElementById('cookie-knife');
            const acceptBtn = document.getElementById('accept-cookie-btn');

            if (!localStorage.getItem('cookieAccepted')) {
                setTimeout(() => {
                    cookieKnife.classList.remove('translate-y-40', 'opacity-0');
                    cookieKnife.classList.add('translate-y-0', 'opacity-100');
                }, 2500);
            }

            acceptBtn.addEventListener('click', () => {
                localStorage.setItem('cookieAccepted', 'true');
                cookieKnife.classList.remove('translate-y-0', 'opacity-100');
                cookieKnife.classList.add('translate-y-40', 'opacity-0');
            });
        });
    </script>

</body>
</html>
