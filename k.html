        <button id="accept-cookie-btn" class="h-12 w-auto md:h-14 bg-[#1a1a1a] rounded-r-md border border-white/10 border-l-0 flex items-center justify-center relative px-4 md:px-6 hover:bg-white hover:text-black hover:border-white transition-colors cursor-pointer group">

            <span class="text-[8px] md:text-[10px] font-bold uppercase text-white group-hover:text-black transition-colors whitespace-nowrap z-20 relative">
                Принять
            </span>
            
        </button>

    </div>

    <!-- Скрипт логики всплывашки -->
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const cookieKnife = document.getElementById('cookie-knife');
            const acceptBtn = document.getElementById('accept-cookie-btn');

            if (!localStorage.getItem('cookieAccepted')) {
                setTimeout(() => {
                    cookieKnife.classList.remove('translate-y-40', 'opacity-0');
                    cookieKnife.classList.add('translate-y-0', 'opacity-100');
                }, 2500);
            }

            acceptBtn.addEventListener('click', () => {
                localStorage.setItem('cookieAccepted', 'true');
                cookieKnife.classList.remove('translate-y-0', 'opacity-100');
                cookieKnife.classList.add('translate-y-40', 'opacity-0');
            });
        });
    </script>
